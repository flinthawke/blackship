name: Build Blackship

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Build treasure
        env:
          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
          ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
          ALIEXPRESS_BASE_URL: https://api-sg.aliexpress.com/sync
          SITE_BASE_URL: https://flinthawke.github.io/blackship
        run: python blackship.py

      - name: Commit built site
        run: |
          git config user.name "blackship-bot"
          git config user.email "actions@github.com"
          git add data/products.json raw_response.json treasure
          git commit -m "auto update blackship products" || echo "no changes"
          git push

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가성비 해외직구 핫딜 정보통</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        header { border-bottom: 2px solid #ff4747; padding-bottom: 20px; margin-bottom: 30px; }
        .deal-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .price { color: #ff4747; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🛒 글로벌 핫딜 매거진</h1>
        <p>알리익스프레스, 알리바바 등 해외 직구 플랫폼의 가성비 특가 상품을 큐레이션하여 소개하는 공간입니다.</p>
    </header>

    <main>
        <h2>오늘의 추천 핫딜</h2>
        
        <div class="deal-card">
            <h3>[초특가] 가성비 무선 기계식 키보드</h3>
            <p>성능과 가격을 모두 잡은 역대급 직구 아이템. 서브 키보드로 강력 추천합니다.</p>
            <p class="price">예상 구매가: $15.99</p>
        </div>

        <div class="deal-card">
            <h3>[MD추천] 스마트 데스크탑 가습기 (C타입)</h3>
            <p>사무실이나 침실에서 쓰기 딱 좋은 저소음 초음파 가습기 세일 정보입니다.</p>
            <p class="price">예상 구매가: $7.50</p>
        </div>
    </main>

    <footer>
        <p>© 2026 글로벌 핫딜 매거진. All rights reserved.</p>
    </footer>

</body>
</html>
